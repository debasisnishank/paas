---
# Antariksh local dev stack
# Mirrors the production service topology — same images, same ports.
# Does NOT include Firecracker (requires KVM); build + deploy flows stub to Docker.
#
# Usage:
#   cd dev && docker compose up -d
#   make dev-seed      # loads Vault secrets + Consul ACL tokens

name: antariksh-dev

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       antariksh
      POSTGRES_USER:     antariksh
      POSTGRES_PASSWORD: devpass
    ports: ["5432:5432"]
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "antariksh"]
      interval: 5s
      timeout: 3s
      retries: 10

  consul:
    image: hashicorp/consul:1.20
    command: >
      agent -dev
      -client=0.0.0.0
      -node=consul-dev
      -datacenter=in-mum-1
      -ui
    ports:
      - "8500:8500"   # UI + HTTP API
      - "8600:8600/udp"  # DNS
    healthcheck:
      test: ["CMD", "consul", "members"]
      interval: 10s

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add: [IPC_LOCK]
    ports: ["8200:8200"]
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: >
      -js
      -m 8222
      --name nats-dev
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s

  temporal:
    image: temporalio/auto-setup:1.25
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB:                    postgresql
      DB_PORT:               5432
      POSTGRES_USER:         antariksh
      POSTGRES_PWD:          devpass
      POSTGRES_SEEDS:        postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamicconfig/development-sql.yaml
    ports: ["7233:7233"]
    volumes:
      - ./temporal-dynamicconfig:/etc/temporal/dynamicconfig

  temporal-ui:
    image: temporalio/ui:2.31
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["8080:8080"]
    depends_on: [temporal]

  # ── Observability ─────────────────────────────────────────────────────────

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.105.0
    command:
      - -storageDataPath=/data
      - -retentionPeriod=1
      - -httpListenAddr=:8428
    ports: ["8428:8428"]
    volumes:
      - vm-data:/data

  loki:
    image: grafana/loki:3.3.0
    command: -config.file=/etc/loki/local-config.yaml
    ports: ["3100:3100"]
    volumes:
      - loki-data:/loki

  grafana:
    image: grafana/grafana:11.4.0
    depends_on: [victoriametrics, loki]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_FEATURE_TOGGLES_ENABLE: traceToMetrics
    ports: ["3000:3000"]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

  # ── Registry ──────────────────────────────────────────────────────────────

  registry:
    image: ghcr.io/project-zot/zot-linux-amd64:v2.1.1
    ports: ["5000:5000"]
    volumes:
      - registry-data:/var/lib/registry
      - ./zot-config.json:/etc/zot/config.json

  # ── Object Storage (MinIO — S3-compatible) ────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s

  # ── Platform services ──────────────────────────────────────────────────────

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    depends_on:
      postgres: { condition: service_healthy }
      nats:     { condition: service_healthy }
      vault:    { condition: service_healthy }
    environment:
      PORT:         8081
      DATABASE_URL: postgres://antariksh:devpass@postgres:5432/antariksh
      NATS_URL:     nats://nats:4222
      VAULT_ADDR:   http://vault:8200
      VAULT_TOKEN:  dev-root-token
      TEMPORAL_HOST: temporal:7233
    ports: ["8081:8081"]

  scheduler:
    build:
      context: ..
      dockerfile: services/scheduler/Dockerfile
    depends_on: [nats, temporal]
    environment:
      NOMAD_ADDR:   http://host.docker.internal:4646   # local Nomad (bare-metal) or stub
      NATS_URL:     nats://nats:4222
      TEMPORAL_HOST: temporal:7233
    extra_hosts:
      - "host.docker.internal:host-gateway"

  builder:
    build:
      context: ..
      dockerfile: services/builder/Dockerfile
    depends_on: [nats]
    environment:
      NATS_URL:      nats://nats:4222
      REGISTRY_URL:  http://registry:5000
      BUILDKIT_ADDR: tcp://buildkitd:1234
    privileged: true   # BuildKit requires it in dev

  buildkitd:
    image: moby/buildkit:v0.17.0-rootless
    privileged: true
    ports: ["1234:1234"]
    volumes:
      - buildkit-cache:/var/lib/buildkit

volumes:
  pg-data:
  vm-data:
  loki-data:
  grafana-data:
  registry-data:
  minio-data:
  buildkit-cache:

networks:
  default:
    name: antariksh-dev
